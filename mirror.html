<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirby Progress Demo</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #f6f7fb;
            font-family: sans-serif;
            background: #08101a;
            background-image:
                radial-gradient(circle at top, rgba(255, 103, 136, 0.15), transparent 40%),
                linear-gradient(180deg, #0b1627 0%, #050a10 100%);
            gap: 40px;
        }

        .preview-stage {
            padding: 30px;
            border-radius: 26px;
            background: rgba(9, 18, 32, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 760px;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            padding: 16px 24px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        button {
            padding: 10px 20px;
            border-radius: 100px;
            border: none;
            background: linear-gradient(180deg, #ff6d93 0%, #ff3f73 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        input[type="range"] {
            width: 200px;
            accent-color: #ff3f73;
            cursor: pointer;
        }
    </style>
    <script src="./kirby-progress.js"></script>
</head>

<body>
    <div class="preview-stage">
        <kirby-progress id="demo-progress"></kirby-progress>
    </div>

    <div class="controls">
        <button id="btn-start">Start Auto Inhale</button>
        <input id="slider" type="range" min="0" max="100" value="0">
    </div>

    <script>
        const progress = document.getElementById("demo-progress");
        const btnStart = document.getElementById("btn-start");
        const slider = document.getElementById("slider");

        btnStart.addEventListener("click", () => {
            progress.start();
        });

        slider.addEventListener("input", (event) => {
            progress.stop();
            progress.setValue(event.target.value);
        });

        progress.addEventListener("progress", (event) => {
            slider.value = Math.floor(event.detail.value);
        });
    </script>
</body>

</html>
